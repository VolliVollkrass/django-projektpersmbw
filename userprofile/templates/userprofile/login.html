{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto p-6">
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Login</h1>

    <form method="post" action="">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700">Benutzername</label>
            <input type="text" name="username" required
                    class="w-full px-3 py-2 input input-primary">
                    
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Passwort</label>
            <input type="password" name="password" required
                    class="w-full px-3 py-2 input input-primary">
        </div>
        <button type="submit"
                class="w-full btn btn-primary py-2 ">
            Login
        </button>
    </form>
    <p class="mt-4 text-center">
        Noch keinen Account? <a href="/" class="link link-primary">anfragen beim Administrator</a>
    </p>
</div>
{% endblock %}
